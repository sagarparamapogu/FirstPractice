name: Deployment
on: push
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Dependencies  
        run: npm ci

      - name: lint
        run: npm run lint

      - name: Test code
        run: npm run test
      
      - name: Build code
        run: npm run build
        
      - name: Deploy code
        run: echo "Deploying..."
